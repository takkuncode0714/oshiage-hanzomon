<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5f35b0" />
  <title>押上 半蔵門線 次の10本</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🚃</text></svg>'>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1fb;
      --card: #ffffff;
      --text: #21172f;
      --muted: #756985;
      --primary: #5f35b0;
      --primary-soft: #efe7ff;
      --border: #e6dff0;
      --shadow: 0 14px 36px rgba(33, 23, 47, 0.12);
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ede4fb 0%, var(--bg) 260px);
      color: var(--text);
    }

    .app {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 2px 16px;
    }

    .title-wrap {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .train-icon {
      flex: 0 0 auto;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(230, 223, 240, 0.9);
      box-shadow: var(--shadow);
      font-size: 28px;
      line-height: 1;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 7vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--primary); }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 9px 20px rgba(95, 53, 176, 0.25);
    }

    button:active { transform: translateY(1px); }

    .train-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(230, 223, 240, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .label {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .value {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .value.small { font-size: 15px; }

    .train-card {
      overflow: hidden;
      margin-bottom: 14px;
    }

    .train-card .train-row:first-child {
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .data-source {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .train-list {
      display: grid;
      gap: 0;
    }

    .train-row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 13px 16px;
      border-top: 1px solid var(--border);
    }

    .time {
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .destination {
      font-size: 17px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .origin {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      padding: 7px 9px;
      border-radius: 14px;
      background: #fff7cc;
      color: #6b4b00;
      font-size: 13px;
      font-weight: 950;
      border: 1px solid #f1d36b;
      white-space: nowrap;
    }

    .origin.empty {
      min-width: 76px;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .badge {
      justify-self: end;
      min-width: 36px;
      padding: 7px 8px;
      border-radius: 14px;
      background: #21172f;
      color: white;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .message {
      padding: 18px 16px 20px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      line-height: 1.7;
      font-weight: 700;
    }

    .soon { color: var(--danger); }

    @media (max-width: 420px) {
      .hero { align-items: stretch; }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="title-wrap">
        <div class="train-icon" aria-hidden="true">🚃</div>
        <div>
          <p class="eyebrow">Tokyo Metro Hanzomon Line</p>
          <h1>押上 半蔵門線<br><span>渋谷方面</span></h1>
        </div>
      </div>
      <button id="refreshButton" type="button">更新</button>
    </header>

    <section class="train-card">
      <div id="trainList" class="train-list"></div>
    </section>
  </main>

  <script>
    const TIMETABLE = [
      { departureTime: "07:03", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "07:08", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "07:13", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "07:19", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "07:24", destination: "鷺沼", platform: "3", startsHere: true },
      { departureTime: "07:29", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "07:34", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "07:39", destination: "長津田", platform: "2", startsHere: true },
      { departureTime: "07:44", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "07:46", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "07:51", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "07:55", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "08:00", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:03", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "08:06", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:09", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "08:13", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:16", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "08:19", destination: "鷺沼", platform: "3", startsHere: true },
      { departureTime: "08:22", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:25", destination: "長津田", platform: "2", startsHere: true },
      { departureTime: "08:28", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:31", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "08:34", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:38", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "08:41", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "08:44", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:47", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "08:50", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "08:54", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "08:57", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:00", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "09:04", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "09:07", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:09", destination: "鷺沼", platform: "3", startsHere: true },
      { departureTime: "09:12", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "09:15", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "09:20", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:25", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "09:28", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:34", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:37", destination: "長津田", platform: "3", startsHere: true },
      { departureTime: "09:40", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "09:43", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:47", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "09:51", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "09:54", destination: "長津田", platform: "1", startsHere: false },
      { departureTime: "09:56", destination: "中央林間", platform: "3", startsHere: true },
      { departureTime: "09:59", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "10:03", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "10:06", destination: "鷺沼", platform: "3", startsHere: true },
      { departureTime: "10:09", destination: "中央林間", platform: "2", startsHere: true },
      { departureTime: "10:12", destination: "中央林間", platform: "1", startsHere: false },
      { departureTime: "10:15", destination: "鷺沼", platform: "3", startsHere: true },
      { departureTime: "10:20", destination: "中央林間", platform: "1", startsHere: false }
    ];

    const el = {
      trainList: document.getElementById("trainList"),
      refreshButton: document.getElementById("refreshButton"),
      dataSourceText: null
    };

    function toTodayDate(timeText, base = new Date()) {
      const [hour, minute] = timeText.split(":").map(Number);
      const date = new Date(base);
      date.setHours(hour, minute, 0, 0);
      return date;
    }

    function formatTime(date) {
      return date.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function getMinutesUntil(departureDate, base = new Date()) {
      return Math.max(0, Math.ceil((departureDate.getTime() - base.getTime()) / 60000));
    }

    function getOptimizedTrains(base = new Date(), count = 10) {
      const withDate = TIMETABLE.map(train => ({
        ...train,
        departureDate: toTodayDate(train.departureTime, base)
      }));

      const next = withDate
        .filter(train => train.departureDate > base)
        .sort((a, b) => a.departureDate - b.departureDate);

      if (next.length > 0) {
        return {
          mode: "normal",
          trains: next.slice(0, count),
          message: ""
        };
      }

      const first = withDate[0];
      const last = withDate[withDate.length - 1];
      if (base < first.departureDate) {
        return {
          mode: "before_first",
          trains: withDate.slice(0, count),
          message: `この時刻表データでは、最初の発車は${first.departureTime}です。`
        };
      }

      return {
        mode: "after_last",
        trains: [],
        message: `この時刻表データでは、最後の発車は${last.departureTime}です。早朝・昼・夜の時刻表を追加すると、この時間帯も表示できます。`
      };
    }

    function render() {
      const now = new Date();
      const { mode, trains, message } = getOptimizedTrains(now, 10);


      if (trains.length === 0) {
        el.trainList.innerHTML = `<div class="message">${message}</div>`;
        return;
      }

      const rows = trains.map((train, index) => {
        const minutes = getMinutesUntil(train.departureDate, now);
        const label = index === 0 && mode === "normal" ? "次発" : `${index + 1}本目`;
        const soonClass = "";
        const soonText = minutes <= 2 && mode === "normal" ? "・まもなく" : "";
        const origin = train.startsHere
          ? `<div class="origin">押上始発</div>`
          : `<div class="origin empty" aria-hidden="true"></div>`;

        return `
          <article class="train-row${soonClass}">
            <div class="time">${train.departureTime}</div>
            <div>
              <div class="destination">${train.destination}行</div>
              <div class="meta">あと${minutes}分${soonText}</div>
            </div>
            ${origin}
            <div class="badge">${train.platform}</div>
          </article>
        `;
      }).join("");

      el.trainList.innerHTML = rows + (message ? `<div class="message">${message}</div>` : "");
    }

    el.refreshButton.addEventListener("click", render);
    render();
  </script>
</body>
</html>
